<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Square-safe brand mark: bold H (HapyJo) with thick strokes and internal padding for 16px clarity. High contrast on light and dark tabs. -->
  <rect width="32" height="32" rx="4" fill="#0f172a"/>
  <!-- Left vertical bar -->
  <rect x="6" y="8" width="4" height="16" rx="1" fill="#3b82f6"/>
  <!-- Right vertical bar -->
  <rect x="22" y="8" width="4" height="16" rx="1" fill="#3b82f6"/>
  <!-- Horizontal bar -->
  <rect x="6" y="12" width="20" height="4" rx="1" fill="#3b82f6"/>
</svg>
